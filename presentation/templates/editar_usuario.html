{% extends "base.html" %}
{% block title %}Editar usuario{% endblock %}
{% block content %}
<div class="container">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('usuarios') }}">Usuarios</a></li>
            <li class="breadcrumb-item active">{{ user.nom }}</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card content-card mb-4">
                <div class="card-header"><h5 class="mb-0">Editar usuario</h5></div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input type="text" name="nom" class="form-control" value="{{ user.nom }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono <span class="text-danger">*</span></label>
                                <input type="text" name="telephone" class="form-control" value="{{ user.telephone }}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo (opcional)</label>
                            <input type="email" name="email" class="form-control" value="{{ user.email or '' }}">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Ciudad <span class="text-danger">*</span></label>
                                <select name="id_ciudad" id="id_ciudad" class="form-select" required>
                                    {% for c in ciudades %}
                                    <option value="{{ c.id }}" {% if c.id == user.id_ciudad %}selected{% endif %}>{{ c.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Agencia <span class="text-danger">*</span></label>
                                <select name="id_agencia" id="id_agencia" class="form-select" required>
                                    {% for a in agencias %}
                                    <option value="{{ a.id }}" {% if a.id == user.id_agencia %}selected{% endif %}>{{ a.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Rol</label>
                                <select name="role" class="form-select">
                                    <option value="usuario" {% if user.role == 'usuario' %}selected{% endif %}>usuario</option>
                                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>admin</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nueva contraseña</label>
                                <input type="password" name="password" class="form-control" minlength="6" placeholder="Dejar vacío para no cambiar">
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('usuarios') }}" class="btn btn-secondary">Volver</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card content-card">
                <div class="card-header"><h5 class="mb-0">Avatar</h5></div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('upload_avatar_usuario', user_id=user.id) }}" enctype="multipart/form-data">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <img
                                id="avatarPreview"
                                src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}"
                                alt="Avatar de {{ user.nom }}"
                                class="rounded-circle border"
                                width="72"
                                height="72"
                                onerror="this.onerror=null;this.src='{{ url_for('static', filename='img/default_avatar.png') }}';"
                            >
                            <div>
                                <div class="fw-semibold">{{ user.nom }}</div>
                                <small class="text-muted">Aperçu actuel de l'avatar</small>
                            </div>
                        </div>
                        <input id="avatarInput" type="file" name="avatar" class="form-control mb-2" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp">
                        <button type="submit" class="btn btn-outline-primary btn-sm">Subir imagen (máx. 2 Mo)</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function cargarAgencias(idCiudad, selectedId) {
    const sel = document.getElementById('id_agencia');
    sel.innerHTML = '<option value="">Cargando…</option>';
    if (!idCiudad) return;
    const r = await fetch('/api/agencias/' + idCiudad);
    const data = await r.json();
    sel.innerHTML = '';
    data.forEach(a => {
        const o = document.createElement('option');
        o.value = a.id;
        o.textContent = a.nombre;
        if (String(a.id) === String(selectedId)) o.selected = true;
        sel.appendChild(o);
    });
}
document.getElementById('id_ciudad').addEventListener('change', function() {
    cargarAgencias(this.value, null);
});

const avatarInput = document.getElementById('avatarInput');
const avatarPreview = document.getElementById('avatarPreview');

if (avatarInput && avatarPreview) {
    avatarInput.addEventListener('change', function() {
        const file = this.files && this.files[0];
        if (!file) return;
        const objectUrl = URL.createObjectURL(file);
        avatarPreview.src = objectUrl;
    });
}
</script>
{% endblock %}
