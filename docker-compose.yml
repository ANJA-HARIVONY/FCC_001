# =============================================================================
# FCC_001 - Docker Compose Configuration
# Déploiement complet avec MariaDB et l'application Flask
# =============================================================================
# Usage: docker compose up -d
# Avec Nginx: docker compose --profile with-nginx up -d
# =============================================================================

services:
  # ===========================================================================
  # Base de données MariaDB
  # ===========================================================================
  mariadb:
    image: mariadb:10.11
    container_name: fcc_001_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-fcc_001_db}
      MYSQL_USER: ${DB_USER:-fcc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fcc_password}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./data/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT_EXTERNAL:-3307}:3306"
    networks:
      - fcc_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --wait-timeout=28800
      --interactive-timeout=28800

  # ===========================================================================
  # Application Flask FCC_001
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: fcc_001_app:latest
    container_name: fcc_001_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      # Configuration Flask
      FLASK_ENV: production
      FLASK_APP: core/app.py
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      
      # Configuration Base de données
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-fcc_001_db}
      DB_USER: ${DB_USER:-fcc_user}
      DB_PASSWORD: ${DB_PASSWORD:-fcc_password}
      
      # Configuration Application
      APP_NAME: ${APP_NAME:-FCC_001 - Atención al Cliente}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      
      # Configuration Logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Configuration WeasyPrint
      WEASYPRINT_AVAILABLE: ${WEASYPRINT_AVAILABLE:-true}
      
      # Initialisation (désactiver en production pour éviter données exemple)
      INIT_SAMPLE_DATA: ${INIT_SAMPLE_DATA:-true}
      
      # Configuration Gunicorn
      PORT: 5001
      WORKERS: ${WORKERS:-4}
      TIMEOUT: ${TIMEOUT:-120}
    volumes:
      # Persistance des données
      - app_logs:/app/logs
      - app_uploads:/app/presentation/uploads
      - app_monitoring:/app/monitoring
      # Instance SQLite de fallback
      - app_instance:/app/instance
    ports:
      - "${APP_PORT:-8089}:5001"
    networks:
      - fcc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # Nginx Reverse Proxy (optionnel, recommandé pour production)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: fcc_001_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./presentation/static:/app/static:ro
      # Certificats SSL (décommenter si nécessaire)
      # - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - fcc_network
    profiles:
      - with-nginx

# =============================================================================
# Volumes persistants
# =============================================================================
volumes:
  mariadb_data:
    driver: local
    name: fcc_001_mariadb_data
  app_logs:
    driver: local
    name: fcc_001_app_logs
  app_uploads:
    driver: local
    name: fcc_001_app_uploads
  app_monitoring:
    driver: local
    name: fcc_001_app_monitoring
  app_instance:
    driver: local
    name: fcc_001_app_instance

# =============================================================================
# Réseau
# =============================================================================
networks:
  fcc_network:
    driver: bridge
    name: fcc_001_network

